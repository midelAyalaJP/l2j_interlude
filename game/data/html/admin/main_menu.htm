<html>
<head>
	<title>Admin Panel - Main</title>
</head>
<body>
<center>

	<img src="L2UI.SquareGray" width=300 height=1>
	
	<!-- ========================= -->
	<!-- TOP MENU -->
	<!-- ========================= -->
	<table width=300>
		<tr>
			<td align=center><button value="Main" action="bypass -h admin_admin" width=70 height=22 back="L2UI_ch3.smallbutton2_over" fore="L2UI_ch3.smallbutton2"></td>
			<td align=center><button value="Game" action="bypass -h admin_admin2" width=70 height=22 back="L2UI_ch3.smallbutton2_over" fore="L2UI_ch3.smallbutton2"></td>
			<td align=center><button value="Effects" action="bypass -h admin_admin3" width=70 height=22 back="L2UI_ch3.smallbutton2_over" fore="L2UI_ch3.smallbutton2"></td>
			<td align=center><button value="Server" action="bypass -h admin_admin4" width=70 height=22 back="L2UI_ch3.smallbutton2_over" fore="L2UI_ch3.smallbutton2"></td>
		</tr>
	</table>
 

 
	<!-- ========================= -->
	<!-- QUICK TOOLS -->
	<!-- ========================= -->
	<table width=300>
		 
		<tr>
			<td align=center><button value="Create Item" action="bypass -h admin_create_item $menu_command" width=80 height=22 back="L2UI_ch3.Btn1_normalOn" fore="L2UI_ch3.Btn1_normal"></td>
			<td align=center><button value="Teleport" action="bypass -h admin_move_to $menu_command" width=80 height=22 back="L2UI_ch3.Btn1_normalOn" fore="L2UI_ch3.Btn1_normal"></td>
			<td align=center><button value="" action="" width=80 height=22 back="L2UI_ch3.Btn1_normalOn" fore="L2UI_ch3.Btn1_normal"></td>
		</tr>
		<tr>
			<td align=center><button value="GM Shop" action="bypass -h admin_gmshop" width=80 height=22 back="L2UI_ch3.Btn1_normalOn" fore="L2UI_ch3.Btn1_normal"></td>
			<td align=center><button value="Enchant" action="bypass -h admin_enchant" width=80 height=22 back="L2UI_ch3.Btn1_normalOn" fore="L2UI_ch3.Btn1_normal"></td>
			<td align=center><button value="" action="" width=80 height=22 back="L2UI_ch3.Btn1_normalOn" fore="L2UI_ch3.Btn1_normal"></td>
		</tr>
	</table>

	<br>
	<img src="L2UI.SquareGray" width=300 height=1><br>

	<!-- ========================= -->
	<!-- PLAYER ACTIONS -->
	<!-- ========================= -->
	<table width=300 bgcolor=111111>
		<tr>
			<td align=center><font color="LEVEL">Player Management</font></td>
		</tr>
	</table>

	<table width=300>
		<tr>
			<td align=center><button value="Manage" action="bypass -h admin_char_manage" width=70 height=18 back="sek.cbui94" fore="sek.cbui92"></td>
			<td align=center><button value="List" action="bypass -h admin_show_characters 1" width=70 height=18 back="sek.cbui94" fore="sek.cbui92"></td>
			<td align=center><button value="Find" action="bypass -h admin_find_character $menu_command" width=70 height=18 back="sek.cbui94" fore="sek.cbui92"></td>
			<td align=center><button value="" action="" width=70 height=18 back="sek.cbui94" fore="sek.cbui92"></td>
		</tr>
		<tr>
			<td align=center><button value="Go To" action="bypass -h admin_goto $menu_command" width=70 height=18 back="sek.cbui94" fore="sek.cbui92"></td>
			<td align=center><button value="Recall" action="bypass -h admin_recall $menu_command" width=70 height=18 back="sek.cbui94" fore="sek.cbui92"></td>
			<td align=center><button value="Set Karma" action="bypass -h admin_setkarma $menu_command" width=70 height=18 back="sek.cbui94" fore="sek.cbui92"></td>
			<td align=center><button value="No Karma" action="bypass -h admin_setkarma 0" width=70 height=18 back="sek.cbui94" fore="sek.cbui92"></td>
		</tr>
		<tr>
			<td align=center><button value="Set Name" action="bypass -h admin_setname $menu_command" width=70 height=18 back="sek.cbui94" fore="sek.cbui92"></td>
			<td align=center><button value="Set Title" action="bypass -h admin_settitle $menu_command" width=70 height=18 back="sek.cbui94" fore="sek.cbui92"></td>
			<td align=center><button value="Get Buffs" action="bypass -h admin_getbuffs $menu_command" width=70 height=18 back="sek.cbui94" fore="sek.cbui92"></td>
			<td align=center><button value="Create Zone" action="bypass -h admin_create_zone $menu_command" width=70 height=18 back="sek.cbui94" fore="sek.cbui92"></td>
		</tr>
	</table>

 
	<!-- ========================= -->
	<!-- SEARCH TOOLS -->
	<!-- ========================= -->
	<table width=300 bgcolor=111111>
		<tr>
			<td align=center><font color="LEVEL">Search Tools</font></td>
		</tr>
	</table>

	<table width=300>
		<tr>
			<td align=center><button value="Items" action="bypass -h admin_search $menu_command" width=80 height=20 back="L2UI_ch3.Btn1_normalOn" fore="L2UI_ch3.Btn1_normal"></td>
			<td align=center><button value="Drops" action="bypass -h admin_buscar $menu_command" width=80 height=20 back="L2UI_ch3.Btn1_normalOn" fore="L2UI_ch3.Btn1_normal"></td>
		</tr>
	</table>

	 
	<!-- ========================= -->
	<!-- TARGET ACTIONS -->
	<!-- ========================= -->
	<table width=300 bgcolor=111111>
		<tr>
			<td align=center><font color="LEVEL">Target Actions</font></td>
		</tr>
	</table>

	<table width=300>
		<tr>
			<td align=center><button value="Kill" action="bypass -h admin_kill" width=70 height=18 back="sek.cbui94" fore="sek.cbui92"></td>
			<td align=center><button value="Res" action="bypass -h admin_res" width=70 height=18 back="sek.cbui94" fore="sek.cbui92"></td>
			<td align=center><button value="Open" action="bypass -h admin_open" width=70 height=18 back="sek.cbui94" fore="sek.cbui92"></td>
			<td align=center><button value="Close" action="bypass -h admin_close" width=70 height=18 back="sek.cbui94" fore="sek.cbui92"></td>
		</tr>
		<tr>
			<td align=center><button value="Delete" action="bypass -h admin_delete" width=70 height=18 back="sek.cbui94" fore="sek.cbui92"></td>
			<td align=center><button value="Heal" action="bypass -h admin_heal" width=70 height=18 back="sek.cbui94" fore="sek.cbui92"></td>
			<td align=center><button value="Pet Info" action="bypass -h admin_summon_info" width=70 height=18 back="sek.cbui94" fore="sek.cbui92"></td>
			<td align=center><button value="Full Food" action="bypass -h admin_fullfood" width=70 height=18 back="sek.cbui94" fore="sek.cbui92"></td>
		</tr>
		<tr>
			<td></td>
			<td align=center><button value="Mobs List" action="bypass -h admin_spawn $menu_command" width=70 height=18 back="sek.cbui94" fore="sek.cbui92"></td>
			<td align=center><button value="Spawnlist" action="bypass -h admin_list_spawns $menu_command" width=70 height=18 back="sek.cbui94" fore="sek.cbui92"></td>
			<td></td>
		</tr>
	</table>
</center>
</body>
</html>
